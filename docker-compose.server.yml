services:
  app:
    image: ${APP_IMAGE:-ghcr.io/thangit2k4/doantotnghiepfinal-erp-app:latest}
    container_name: erp_app
    restart: always
    working_dir: /var/www/html
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/key.json
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - storage_data:/var/www/html/storage
      - ./key.json:/app/key.json:ro
    # Image mặc định cũng là serve; khai báo rõ để không lẫn với worker
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - erp_net

  # Worker queue — KHÔNG được dùng cùng command với app (php artisan serve)
  queue:
    image: ${APP_IMAGE:-ghcr.io/thangit2k4/doantotnghiepfinal-erp-app:latest}
    container_name: erp_queue
    restart: always
    working_dir: /var/www/html
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/key.json
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage
      - ./key.json:/app/key.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    # Dạng mảng: tránh entrypoint coi cả chuỗi là một tham số (worker không chạy)
    command:
      - php
      - artisan
      - queue:work
      - --verbose
      - --tries=3
      - --max-time=3600
      - --sleep=3
    networks:
      - erp_net

  nginx:
    image: nginx:alpine
    container_name: erp_web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - erp_net

  certbot:
    image: certbot/certbot
    container_name: erp_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
      while :; do
        certbot renew;
        sleep 12h & wait $${!};
      done"

  db:
    image: mysql:8
    container_name: erp_db
    restart: always
    environment:
      MYSQL_DATABASE: erp
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - erp_net

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: always
    networks:
      - erp_net

volumes:
  db_data:
  storage_data:

networks:
  erp_net:
