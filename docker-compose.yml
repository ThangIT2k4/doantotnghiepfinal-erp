x-app-environment: &app-environment
  # Chỉ ép DB/Redis — KHÔNG ép APP_URL (production chạy docker-compose.server.yml, không dùng khối này).
  # APP_URL lấy từ .env: local phải có đủ host:port (vd. http://localhost:8000) để đăng nhập/redirect đúng.
  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE:-erp}
  DB_USERNAME: ${DB_USERNAME:-erp_user}
  DB_PASSWORD: ${DB_PASSWORD:-123456}
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: erp-app
    working_dir: /var/www/html
    environment: *app-environment
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "COMPOSER_MEMORY_LIMIT=-1 composer install --no-interaction --prefer-dist
      && php artisan serve --host=0.0.0.0 --port=8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/up >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 180s
    networks:
      - erp-network

  web:
    image: nginx:1.27-alpine
    container_name: erp-web
    ports:
      - "${DOCKER_WEB_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - erp-network

  db:
    image: mysql:8.0
    container_name: erp-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: erp
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - erp-network

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    networks:
      - erp-network

  # Laravel queue worker — cần chạy liên tục khi QUEUE_CONNECTION không phải sync (email nền)
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: erp-queue
    working_dir: /var/www/html
    environment: *app-environment
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_healthy
    command: >
      sh -c "COMPOSER_MEMORY_LIMIT=-1 composer install --no-interaction --prefer-dist
      && php artisan queue:work
      --verbose
      --tries=3
      --max-time=3600
      --sleep=3"
    restart: unless-stopped
    networks:
      - erp-network

  node:
    image: node:22-alpine
    container_name: erp-node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    profiles:
      - frontend
    networks:
      - erp-network

volumes:
  db_data:

networks:
  erp-network:
    driver: bridge
