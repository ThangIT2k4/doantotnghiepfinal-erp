server {
    listen 80;
    server_name zororms.software www.zororms.software;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name zororms.software www.zororms.software;

    ssl_certificate /etc/letsencrypt/live/zororms.software/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zororms.software/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://app:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;

        # Ngăn Nginx tự redirect — để Laravel xử lý
        proxy_redirect off;

        # Timeout hợp lý cho API calls
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}